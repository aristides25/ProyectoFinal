; ============================================================================
;  Inventario de Ansible — Proyecto CREATIC (Módulo 5)
;  Define los hosts objetivo del hardening automatizado.
;  Los servidores Windows se documentan aquí para dar visibilidad del alcance
;  completo, pero su hardening se ejecuta con PowerShell (no con Ansible).
; ============================================================================

; --- Servidores Linux: objetivos del playbook hardening-linux.yml ---
[linux_servers]
; Servidor Web Apache (Portal Académico)
CR-APPSRV-02 ansible_host=10.10.10.12
; Base de Datos MySQL (Calificaciones y Finanzas)
CR-DB-01     ansible_host=10.10.10.13

; --- Servidores Windows: hardening vía powershell/Harden-Windows.ps1 ---
; (Se listan solo como referencia de inventario; Ansible no los gestiona aquí.)
[windows_servers]
CR-DC-01     ansible_host=10.10.10.10   ; Controlador de Dominio / DNS / DHCP
CR-FILE-03   ansible_host=10.10.10.11   ; Servidor de archivos (Administración)

; --- Variables de conexión del grupo Linux ---
; NOTA: el puerto y el usuario se sobrescriben desde group_vars/all.yml una vez
; aplicado el hardening (puerto SSH cambia de 22 a {{ ssh_puerto }}).
[linux_servers:vars]
ansible_user=adminseg
ansible_python_interpreter=/usr/bin/python3
; Durante el PRIMER arranque el puerto sigue siendo 22; tras el hardening,
; reconectar usando: -e "ansible_port={{ ssh_puerto }}"
ansible_port=22
</content>
